version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# StreamHub — Development Docker Compose
#
# Use this for local development. All ports are exposed so you can hit each
# service directly for debugging.
#
#   docker compose -f docker-compose.dev.yml up -d --build
# ─────────────────────────────────────────────────────────────────────────────

services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000/api
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "4000:4000"
    volumes:
      - ./database:/app/database
    environment:
      - CS3_BRIDGE_URL=http://cs3bridge:5000
      - TMDB_API_KEY=${TMDB_API_KEY:-}
      - OMDB_API_KEY=${OMDB_API_KEY:-}
      - OPENSUBTITLES_API_KEY=${OPENSUBTITLES_API_KEY:-}
      - SUBDL_API_KEY=${SUBDL_API_KEY:-}
      - DB_PATH=/app/database/streamhub.db
      - PORT=4000
      - HOST=0.0.0.0
    depends_on:
      - cs3bridge
    restart: unless-stopped

  cs3bridge:
    build: ./cs3-bridge
    ports:
      - "5000:5000"
    volumes:
      - ./cs3-bridge/extensions:/app/extensions
    environment:
      - PORT=5000
      - HOST=0.0.0.0
      - EXTENSIONS_DIR=/app/extensions
    restart: unless-stopped
