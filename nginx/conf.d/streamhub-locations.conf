# ─────────────────────────────────────────────────────────────────────────────
# StreamHub Nginx location config
#
# This file is included by both the HTTP and HTTPS server blocks in nginx.conf.
# It defines all the routing rules.
# ─────────────────────────────────────────────────────────────────────────────

# ─── Admin IP allowlist ───
# IMPORTANT: Replace these with your own IP(s) before going live.
# Find your current IP at https://ifconfig.me or https://icanhazip.com
# Add one `allow x.x.x.x;` line per trusted IP.
#
# Default: allow localhost + private LAN ranges only.
# Public internet is denied for /api/admin/* (see location block below).
geo $is_trusted_admin {
    default 0;
    # Localhost
    127.0.0.1 1;
    ::1 1;
    # Docker internal network
    172.16.0.0/12 1;
    # Private LAN (change to your actual subnet, e.g. 192.168.1.0/24)
    192.168.0.0/16 1;
    10.0.0.0/8 1;

    # ┌─────────────────────────────────────────────────────────────┐
    # │  ADD YOUR PUBLIC IP HERE (if accessing remotely)            │
    # │  Example:                                                   │
    # │  203.0.113.42 1;                                            │
    # └─────────────────────────────────────────────────────────────┘
}

# ─── Frontend (Next.js PWA) ───
location / {
    proxy_pass http://frontend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
}

# ─── Backend API (public — search, details, stream, etc.) ───
location /api/ {
    limit_req zone=api burst=60 nodelay;
    proxy_pass http://backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;  # Important for HLS streaming
    proxy_read_timeout 300s;
}

# ─── Admin endpoints (restricted by IP + rate-limited) ───
location /api/admin/ {
    # IP allowlist — deny public access
    if ($is_trusted_admin = 0) {
        return 403;
    }
    limit_req zone=admin burst=20 nodelay;
    proxy_pass http://backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# ─── TMDB image cache (optional, saves bandwidth) ───
location /image/ {
    proxy_pass https://image.tmdb.org/;
    proxy_cache_valid 200 7d;
    expires 7d;
    proxy_set_header Host image.tmdb.org;
}

# ─── Health check (for uptime monitors) ───
location = /health {
    access_log off;
    proxy_pass http://backend/api/health;
}

# ─── Block dotfiles and sensitive paths ───
location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
}
