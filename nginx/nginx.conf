worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;
    client_max_body_size 50m;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Rate limit admin endpoints — 10 req/min per IP
    limit_req_zone $binary_remote_addr zone=admin:10m rate=10r/m;
    # Rate limit API globally — 30 req/sec per IP
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    upstream frontend {
        server frontend:3000;
    }
    upstream backend {
        server backend:4000;
    }

    # ─── HTTP — redirects to HTTPS in production ───
    server {
        listen 80 default_server;
        server_name _;

        # Uncomment after Certbot is set up:
        # return 301 https://$host$request_uri;

        # Until HTTPS is configured, serve directly over HTTP:
        include /etc/nginx/conf.d/streamhub-locations.conf;
    }

    # ─── HTTPS — enable after `certbot --nginx -d yourdomain.com` ───
    # server {
    #     listen 443 ssl http2;
    #     server_name yourdomain.com;
    #     ssl_certificate /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     include /etc/nginx/conf.d/streamhub-locations.conf;
    # }
}
